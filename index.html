<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      padding: 0;
    }

    /* grid    */

    ul {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      position: relative;
      overflow: hidden;
    }

    li img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
  <body>
    <main>
      <div class="container">
        <ul>
          <li>
            <img src="/images/IMG_9274.jpeg" title="2014.10.10" />
          </li>
        </ul>
      </div>
    </main>
  </body>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const getData = async () => {
        const res = await fetch(`/data.json`);
        const data = await res.json();
        return data;
      };

      const data = await getData();

      console.log(data);
    });
  </script>
</html>
